<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi3D Notes App</title>
    
    <!-- PWA Setup (For Vercel & APK Feel) -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        body { 
            margin: 0; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #050510; color: white;
            overscroll-behavior: none; /* Prevents mobile pull-to-refresh */
        }
        
        /* Floating Trigger Buttons (APK Feel) */
        .panel-trigger {
            position: absolute; z-index: 20; width: 50px; height: 50px; border-radius: 50%;
            background: rgba(15, 15, 25, 0.9); border: 1px solid #00ff88; color: #00ff88;
            font-size: 24px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .panel-trigger:active { transform: scale(0.9); }
        #add-trigger { top: 20px; left: 20px; font-weight: bold; }
        #search-trigger { top: 20px; right: 20px; }

        /* UI Panels - Hidden smoothly by default */
        .panel {
            position: absolute; background: rgba(15, 15, 25, 0.85); padding: 15px;
            border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            border: 1px solid #333; z-index: 10; backdrop-filter: blur(4px);
            transition: all 0.3s ease; opacity: 0; pointer-events: none; transform: translateY(-10px);
        }
        
        /* THIS WAS THE BUG: Now panels actually show up! */
        .panel.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
        
        #controls-container { top: 80px; left: 20px; width: 280px; }
        #search-container { top: 80px; right: 20px; width: 250px; }
        
        /* Mi Notes Modal Panel */
        #info-panel { 
            bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); 
            width: 450px; max-width: 95vw; border-color: #00ff88; flex-direction: column; display: flex;
        }
        #info-panel.visible { transform: translateX(-50%) translateY(0); }

        /* Fullscreen Notes App Styling (Trapped Fix) */
        #info-panel.info-fullscreen {
            position: fixed; width: 100%; height: 100dvh; max-width: none;
            top: 0; left: 0; bottom: auto; transform: none; border-radius: 0;
            background: rgba(10, 10, 15, 0.98); z-index: 9999;
            padding: 70px 20px 20px 20px; display: flex; flex-direction: column;
            border-top: none; box-sizing: border-box;
        }
        #info-panel.info-fullscreen .close-btn { top: 15px; right: 20px; font-size: 36px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        #info-panel.info-fullscreen .fs-btn { top: 22px; right: 75px; font-size: 28px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        /* Empty State Message */
        #empty-state-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #555; font-size: 24px; font-weight: bold; text-align: center;
            z-index: 5; pointer-events: none; transition: opacity 0.3s;
        }

        /* Inputs & Buttons */
        input, textarea {
            width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 10px;
            border: 1px solid #555; border-radius: 4px; background: rgba(0,0,0,0.5); color: white; outline: none;
        }
        input:focus { border-color: #00ff88; }
        
        .main-btn, .btn-secondary { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .main-btn { background: #007bff; color: white; }
        .main-btn:hover { background: #0056b3; }
        .btn-secondary { background: #555; color: white; }
        .btn-secondary:hover { background: #777; }

        h3 { margin: 0 0 10px 0; font-size: 16px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 5px;}
        .status { margin-bottom: 12px; font-size: 14px; }
        #active-node-display { color: #00ff88; font-weight: bold; padding: 2px 6px; background: rgba(0, 255, 136, 0.1); border-radius: 3px; word-wrap: break-word; }

        /* Top Right Buttons */
        .close-btn, .fs-btn { position: absolute; top: 10px; background: transparent; color: #aaa; width: auto; padding: 0; font-size: 24px; border: none; cursor: pointer; z-index: 10; }
        .close-btn { right: 15px; }
        .fs-btn { right: 50px; font-size: 20px; top: 12px;}
        .close-btn:hover, .fs-btn:hover { color: white; }

        /* Mi Notes Flowing Editor CSS */
        #edit-title-input { width: calc(100% - 60px); background: none; border: none; border-bottom: 1px solid #333; color: #00ff88; font-size: 24px; font-weight: bold; margin-bottom: 15px; padding-bottom: 5px; outline: none; border-radius: 0; }
        #edit-content-input { width: 100%; min-height: 150px; max-height: 35vh; overflow-y: auto; color: #ddd; font-size: 16px; outline: none; line-height: 1.6; white-space: pre-wrap; word-break: break-word; background: none; border: none; padding: 0; flex-grow: 1; }
        #info-panel.info-fullscreen #edit-content-input { max-height: none; font-size: 18px; padding-bottom: 50px; }
        #edit-content-input img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; margin: 10px 0; cursor: pointer; border: 1px solid #444; }
        #edit-content-input video { width: 100%; border-radius: 12px; margin: 10px 0; }
        
        /* Bottom Toolbar */
        .toolbar { display: flex; justify-content: space-between; border-top: 1px solid #333; padding-top: 10px; margin-top: 10px; }
        .toolbar button { background: none; border: none; font-size: 20px; color: #aaa; cursor: pointer; width: auto; padding: 5px 10px; margin: 0; }
        .toolbar button:hover { color: #00ff88; }
        
        /* Fullscreen Image Viewer */
        .image-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .image-viewer img { max-width: 100%; max-height: 100%; border-radius: 15px; }

        /* Mobile Overrides */
        @media (max-width: 768px) {
            #controls-container, #search-container { width: 280px; left: 50%; margin-left: -140px; top: 80px; }
            .main-btn, .btn-secondary { padding: 12px; } /* Larger touch targets */
            
            /* Mobile Info Panel Adjustments (Bottom Sheet Style) */
            #info-panel { 
                bottom: 0; width: 100vw; max-width: 100vw; 
                border-radius: 24px 24px 0 0; padding: 20px 15px 10px 15px; 
                border-left: none; border-right: none; border-bottom: none;
            }
            #edit-content-input { max-height: 40vh; } /* Gives keyboard room */
            .toolbar button { font-size: 18px; padding: 5px; } /* Prevent toolbar crowding */
            
            /* Adjust Fullscreen on Mobile */
            #info-panel.info-fullscreen { padding-top: 60px; border-radius: 0; }
        }
    </style>

    <!-- Locked, stable versions of 3D libraries -->
    <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.8.1/dist/three-spritetext.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
</head>
<body>

<!-- Floating APK Triggers -->
<div id="add-trigger" class="panel-trigger" onclick="toggleUI('controls-container')">＋</div>
<div id="search-trigger" class="panel-trigger" onclick="toggleUI('search-container')">🔍</div>

<div id="empty-state-message">Graph is empty.<br>Add your first node!</div>

<!-- Left Panel: Node Creation -->
<div id="controls-container" class="panel">
    <h3>Build Graph</h3>
    <div class="status">
        Parent: <span id="active-node-display">None (Will be Root)</span>
    </div>
    <input type="text" id="node-input" placeholder="Node Title..." autocomplete="off">
    <button id="add-btn" class="main-btn">Add Node</button>
</div>

<!-- Right Panel: Search -->
<div id="search-container" class="panel">
    <h3>Search & Highlight</h3>
    <input type="text" id="search-input" placeholder="Search Node Title..." autocomplete="off">
    <button id="search-btn" class="main-btn">Find Path</button>
    <button id="clear-search-btn" class="btn-secondary">Clear Highlight</button>
    <button id="reset-cam-btn" class="btn-secondary">Reset Camera</button>
</div>

<!-- Bottom Panel: Mi Notes Flowing Editor Modal -->
<div id="info-panel" class="panel">
    <button id="fs-btn" class="fs-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">⛶</button>
    <button class="close-btn" onclick="closeInfoPanel()">×</button>
    
    <input type="text" id="edit-title-input" placeholder="Node Title...">
    
    <!-- FLOWING CONTENT EDITOR -->
    <div id="edit-content-input" contenteditable="true" placeholder="Write notes here... mix text, images, and video!"></div>
    
    <!-- Bottom Toolbar -->
    <div class="toolbar">
        <button onclick="document.execCommand('undo')" title="Undo">↶</button>
        <button onclick="document.execCommand('redo')" title="Redo">↷</button>
        <button onclick="document.getElementById('imagePicker').click()" title="Add Media">🖼️</button>
        <button onclick="addCheckbox()" title="Add Checkbox">☑️</button>
        <button onclick="saveNodeEdits()" style="color:#00ff88; font-weight:bold;" title="Save Changes">✓ Save</button>
    </div>
</div>

<!-- Hidden File Picker & Fullscreen Viewer -->
<input type="file" id="imagePicker" style="display:none;" accept="image/*,video/*" multiple>
<div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
    <img id="fullscreenImage">
</div>

<div id="3d-graph"></div>

<script>
    // --- IndexedDB Persistence Engine ---
    const DB_NAME = 'MiNotes3D_DB';
    const DB_VERSION = 1;
    const STORE_NAME = 'notes';
    let db;

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = (e) => reject("DB Error: " + e.target.errorCode);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                resolve(db);
            };
        });
    }

    async function saveToDB(notesArray) {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        
        // FIX: Use .put() to safely update existing nodes and insert new ones without race conditions
        notesArray.forEach(note => {
            const cleanNote = { ...note };
            delete cleanNote.__sprite; 
            delete cleanNote.parent; 
            store.put(cleanNote); 
        });
    }

    async function loadFromDB() {
        return new Promise((resolve) => {
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
        });
    }

    // --- State Management ---
    const graphData = { nodes: [], links: [] };
    let activeNode = null;
    let idCounter = 1;

    const highlightNodes = new Set();
    const highlightLinks = new Set();
    const levelColors = ['#e6194b', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#46f0f0'];

    // --- Graph Initialization ---
    const Graph = ForceGraph3D()(document.getElementById('3d-graph'))
        .nodeColor(node => highlightNodes.has(node) ? 'rgba(255, 255, 255, 0.9)' : levelColors[node.level % levelColors.length])
        .nodeRelSize(6) 
        .linkWidth(link => highlightLinks.has(link) ? 3 : 1)
        .linkColor(link => highlightLinks.has(link) ? 'rgba(255, 255, 255, 0.6)' : 'rgba(255,255,255,0.2)')
        .linkDirectionalParticles(link => highlightLinks.has(link) ? 4 : 0)
        .linkDirectionalParticleWidth(2)
        .nodeThreeObjectExtend(true)
        .nodeThreeObject(node => {
            const sprite = new SpriteText(node.name);
            sprite.color = 'white';
            sprite.textHeight = 4;
            sprite.position.set(0, 12, 0); 
            node.__sprite = sprite; 
            return sprite;
        })
        .onNodeClick(node => {
            activeNode = node;
            updateActiveNodeDisplay();
            openInfoPanel(node); // THIS WILL NOW SHOW PROPERLY!

            const distance = 80;
            const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
            const newPos = node.x || node.y || node.z
                ? { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }
                : { x: 0, y: 0, z: distance };
            Graph.cameraPosition(newPos, node, 1000);
        });

    // --- Initial App Load (Async DB) ---
    async function startApp() {
        await initDB();
        const savedNotes = await loadFromDB();
        
        if (savedNotes.length > 0) {
            document.getElementById('empty-state-message').style.opacity = '0';
            idCounter = Math.max(...savedNotes.map(n => n.id)) + 1;
            graphData.nodes = savedNotes.map(n => ({ ...n }));
            
            // Rebuild links
            savedNotes.forEach(note => {
                if (note.parentId !== undefined && note.parentId !== null) {
                    graphData.links.push({ source: note.parentId, target: note.id });
                    const child = graphData.nodes.find(n => n.id === note.id);
                    child.parent = graphData.nodes.find(p => p.id === note.parentId);
                }
            });
        }
        
        Graph.graphData(graphData);
        updateActiveNodeDisplay();
    }
    startApp();

    // --- Add Nodes Logic ---
    function addNode() {
        const titleEl = document.getElementById('node-input');
        const nodeName = titleEl.value.trim();
        if (!nodeName) { alert("Please enter a Node Title"); return; }

        const newNode = { 
            id: idCounter++, 
            name: nodeName,
            info: "", 
            level: activeNode ? activeNode.level + 1 : 0,
            parent: activeNode,
            parentId: activeNode ? activeNode.id : null
        };

        if (graphData.nodes.length === 0) {
            graphData.nodes.push(newNode);
            document.getElementById('empty-state-message').style.opacity = '0';
        } else {
            graphData.nodes.push(newNode);
            graphData.links.push({ source: activeNode.id, target: newNode.id });
        }

        activeNode = newNode;
        updateActiveNodeDisplay();
        saveToDB(graphData.nodes);
        Graph.graphData({ nodes: [...graphData.nodes], links: [...graphData.links] });
        
        titleEl.value = '';
        titleEl.blur(); 
        
        toggleUI('controls-container'); // Hide panel
        openInfoPanel(newNode); // Open editor
    }

    // --- Search Logic ---
    function searchAndHighlight() {
        const query = document.getElementById('search-input').value.trim().toLowerCase();
        if (!query) return;

        highlightNodes.clear(); highlightLinks.clear();
        const targetNode = graphData.nodes.find(n => n.name.toLowerCase().includes(query));
        
        if (targetNode) {
            let current = targetNode;
            highlightNodes.add(current);
            while (current.parent != null) {
                const link = graphData.links.find(l => 
                    (l.source.id === current.parent.id && l.target.id === current.id) ||
                    (l.target.id === current.parent.id && l.source.id === current.id)
                );
                if (link) highlightLinks.add(link);
                current = current.parent;
                highlightNodes.add(current);
            }

            Graph.cameraPosition({ x: targetNode.x, y: targetNode.y, z: targetNode.z + 80 }, targetNode, 1500);
            activeNode = targetNode;
            updateActiveNodeDisplay();
            toggleUI('search-container'); // Hide panel
            openInfoPanel(targetNode); // Open editor
        } else { alert("Node not found!"); }

        updateGraphVisuals();
        document.getElementById('search-input').blur();
    }

    function clearHighlight() {
        highlightNodes.clear(); highlightLinks.clear();
        document.getElementById('search-input').value = '';
        updateGraphVisuals();
        closeInfoPanel();
    }

    function updateGraphVisuals() {
        Graph.nodeColor(Graph.nodeColor()).linkWidth(Graph.linkWidth())
             .linkColor(Graph.linkColor()).linkDirectionalParticles(Graph.linkDirectionalParticles());
    }

    document.getElementById('reset-cam-btn').addEventListener('click', () => {
        Graph.cameraPosition({ x: 0, y: 0, z: 250 }, { x: 0, y: 0, z: 0 }, 1500);
    });

    // --- UI Controls & MI NOTES LOGIC ---
    function toggleUI(id) {
        const target = document.getElementById(id);
        const otherId = id === 'controls-container' ? 'search-container' : 'controls-container';
        document.getElementById(otherId).classList.remove('visible'); 
        target.classList.toggle('visible');
    }

    function updateActiveNodeDisplay() {
        document.getElementById('active-node-display').innerText = activeNode ? activeNode.name : "None (Will be Root)";
    }

    function openInfoPanel(node) {
        document.getElementById('edit-title-input').value = node.name || "";
        document.getElementById('edit-content-input').innerHTML = node.info || "";
        document.getElementById('info-panel').classList.add('visible'); // <-- THE MAGIC FIX
    }

    function closeInfoPanel() {
        document.getElementById('info-panel').classList.remove('visible'); // <-- THE MAGIC FIX
    }

    function toggleFullscreen() {
        const panel = document.getElementById('info-panel');
        panel.classList.toggle('info-fullscreen');
        document.getElementById('fs-btn').innerText = panel.classList.contains('info-fullscreen') ? '🗗' : '⛶';
    }

    function saveNodeEdits() {
        if (!activeNode) return;
        const newTitle = document.getElementById('edit-title-input').value.trim();
        if (!newTitle) { alert("Node title cannot be empty."); return; }

        activeNode.name = newTitle;
        activeNode.info = document.getElementById('edit-content-input').innerHTML;
        if (activeNode.__sprite) activeNode.__sprite.text = newTitle;

        updateActiveNodeDisplay();
        saveToDB(graphData.nodes); // Save everything locally!
        
        const saveBtn = document.querySelector('.toolbar button:last-child');
        const originalText = saveBtn.innerText;
        saveBtn.innerText = "Saved!";
        setTimeout(() => saveBtn.innerText = originalText, 1500);
    }

    function addCheckbox() {
        const editor = document.getElementById("edit-content-input");
        editor.innerHTML += "☐ ";
        editor.focus();
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(editor);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }

    document.getElementById("imagePicker").addEventListener("change", function(){
        Array.from(this.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const editor = document.getElementById("edit-content-input");
                if (file.type.startsWith("image")) {
                    editor.innerHTML += `<img src="${e.target.result}" onclick="openImageViewer('${e.target.result}')">`;
                } else if (file.type.startsWith("video")) {
                    editor.innerHTML += `<video controls><source src="${e.target.result}"></video>`;
                }
                editor.innerHTML += "<br><br>";
            };
            reader.readAsDataURL(file);
        });
    });

    function openImageViewer(src) { document.getElementById("imageViewer").style.display = "flex"; document.getElementById("fullscreenImage").src = src; }
    function closeImageViewer() { document.getElementById("imageViewer").style.display = "none"; }

    // Service Worker for PWA
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    // Event Listeners
    document.getElementById('add-btn').addEventListener('click', addNode);
    document.getElementById('search-btn').addEventListener('click', searchAndHighlight);
    document.getElementById('clear-search-btn').addEventListener('click', clearHighlight);
    document.getElementById('node-input').addEventListener('keypress', e => { if (e.key === 'Enter') addNode(); });
    document.getElementById('search-input').addEventListener('keypress', e => { if (e.key === 'Enter') searchAndHighlight(); });
</script>
</body>
</html>
