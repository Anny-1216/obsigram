<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Notes Style App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:black;
    color:white;
    overflow-x:hidden;
}

/* =========================
   NOTES LIST PAGE
========================= */

#homePage{
    padding:20px;
}

.notes-container{
    display:flex;
    flex-direction:column;
    gap:22px;
    margin-top:20px;
}

.note-card{
    background:#1f1f1f;
    border-radius:35px;
    padding:30px;
    min-height:170px;
    cursor:pointer;
    transition:0.3s;
}

.note-card:hover{
    transform:scale(1.01);
}

.note-title{
    font-size:30px;
    margin-bottom:18px;
}

.note-preview{
    color:#9c9c9c;
    font-size:22px;
    margin-bottom:18px;
}

.note-date{
    color:#767676;
    font-size:18px;
}

/* Floating Add Button */

.add-btn{
    position:fixed;
    bottom:30px;
    right:25px;
    width:65px;
    height:65px;
    border-radius:50%;
    border:none;
    background:white;
    color:black;
    font-size:40px;
    cursor:pointer;
    z-index:100;
}

/* =========================
   EDIT PAGE
========================= */

#editorPage{
    display:none;
    flex-direction:column;
    height:100vh;
    background:black;
}

/* Top Bar */

.topbar{
    height:80px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    font-size:40px;
}

.topbar button{
    background:none;
    border:none;
    color:white;
    font-size:40px;
    cursor:pointer;
}

/* Editor Area */

.editor{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

#titleInput{
    width:100%;
    background:none;
    border:none;
    color:white;
    font-size:22px;
    margin-bottom:25px;
    outline:none;
}

#contentInput{
    width:100%;
    min-height:300px;
    background:none;
    border:none;
    color:white;
    font-size:18px;
    outline:none;
    resize:none;
    line-height:1.7;
}

/* Media */

.media-preview{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.media-preview img,
.media-preview video{
    width:100%;
    border-radius:20px;
}

/* Bottom Toolbar */

.toolbar{
    height:80px;
    background:#121212;
    border-top:1px solid #2b2b2b;
    display:flex;
    align-items:center;
    justify-content:space-around;
    position:sticky;
    bottom:0;
}

.toolbar button{
    background:none;
    border:none;
    color:white;
    font-size:28px;
    cursor:pointer;
}

/* Checkbox Style */

.check-item{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    font-size:20px;
}

.check-item input{
    width:22px;
    height:22px;
}

.hidden{
    display:none;
}

</style>
</head>
<body>

<!-- =========================
     HOME PAGE
========================= -->

<div id="homePage">

    <div class="notes-container" id="notesContainer"></div>

    <button class="add-btn" onclick="createNewNote()">+</button>

</div>

<!-- =========================
     EDITOR PAGE
========================= -->

<div id="editorPage">

    <div class="topbar">

        <button onclick="goBack()">←</button>

        <div>
            <button onclick="undoText()">↶</button>
            <button onclick="redoText()">↷</button>
        </div>

        <button onclick="saveNote()">✓</button>

    </div>

    <div class="editor">

        <input type="text" id="titleInput" placeholder="Title">

        <textarea id="contentInput" placeholder="Write something..."></textarea>

        <div class="media-preview" id="mediaPreview"></div>

    </div>

    <!-- Bottom Toolbar -->

    <div class="toolbar">

        <button onclick="recordAudio()">🎤</button>

        <button onclick="document.getElementById('imagePicker').click()">🖼️</button>

        <button onclick="addScribble()">✍️</button>

        <button onclick="addCheckbox()">☑️</button>

        <button onclick="focusText()">T</button>

    </div>

</div>

<!-- Hidden Inputs -->

<input type="file" id="imagePicker" class="hidden"
accept="image/*,video/*" multiple>

<script>

let notes = JSON.parse(localStorage.getItem("miNotes")) || [];

let currentIndex = null;

let mediaData = [];

const notesContainer = document.getElementById("notesContainer");

function saveLocal(){
    localStorage.setItem("miNotes", JSON.stringify(notes));
}

/* =========================
   RENDER NOTES
========================= */

function renderNotes(){

    notesContainer.innerHTML = "";

    notes.forEach((note,index)=>{

        const card = document.createElement("div");
        card.className = "note-card";

        card.innerHTML = `
            <div class="note-title">${note.title || "Untitled"}</div>

            <div class="note-preview">
                ${(note.content || "").substring(0,40)}
            </div>

            <div class="note-date">
                ${note.date}
            </div>
        `;

        card.onclick = ()=>openNote(index);

        notesContainer.appendChild(card);

    });

}

/* =========================
   CREATE NOTE
========================= */

function createNewNote(){

    currentIndex = null;

    document.getElementById("titleInput").value = "";
    document.getElementById("contentInput").value = "";

    document.getElementById("mediaPreview").innerHTML = "";

    mediaData = [];

    showEditor();

}

/* =========================
   OPEN NOTE
========================= */

function openNote(index){

    currentIndex = index;

    const note = notes[index];

    document.getElementById("titleInput").value = note.title;
    document.getElementById("contentInput").value = note.content;

    mediaData = note.media || [];

    renderMedia();

    showEditor();

}

/* =========================
   SAVE NOTE
========================= */

function saveNote(){

    const title = document.getElementById("titleInput").value;

    const content = document.getElementById("contentInput").value;

    const noteObj = {
        title,
        content,
        media:mediaData,
        date:new Date().toLocaleString()
    };

    if(currentIndex === null){

        notes.unshift(noteObj);

    }else{

        notes[currentIndex] = noteObj;
    }

    saveLocal();

    renderNotes();

    goBack();

}

/* =========================
   PAGE SWITCH
========================= */

function showEditor(){

    document.getElementById("homePage").style.display = "none";

    document.getElementById("editorPage").style.display = "flex";
}

function goBack(){

    document.getElementById("editorPage").style.display = "none";

    document.getElementById("homePage").style.display = "block";
}

/* =========================
   MEDIA UPLOAD
========================= */

document.getElementById("imagePicker")
.addEventListener("change", function(){

    const files = this.files;

    Array.from(files).forEach(file=>{

        const reader = new FileReader();

        reader.onload = function(e){

            mediaData.push({
                type:file.type,
                data:e.target.result
            });

            renderMedia();

        };

        reader.readAsDataURL(file);

    });

});

function renderMedia(){

    const preview = document.getElementById("mediaPreview");

    preview.innerHTML = "";

    mediaData.forEach(item=>{

        if(item.type.startsWith("image")){

            preview.innerHTML += `
                <img src="${item.data}">
            `;
        }

        else if(item.type.startsWith("video")){

            preview.innerHTML += `
                <video controls>
                    <source src="${item.data}">
                </video>
            `;
        }

    });

}

/* =========================
   TOOLBAR FUNCTIONS
========================= */

function focusText(){

    document.getElementById("contentInput").focus();
}

function addCheckbox(){

    const textarea = document.getElementById("contentInput");

    textarea.value += "\n☐ ";

    textarea.focus();
}

function addScribble(){

    alert("Future canvas scribble feature ✍️");
}

function recordAudio(){

    alert("Future audio recording feature 🎤");
}

/* =========================
   UNDO REDO
========================= */

function undoText(){

    document.execCommand("undo");
}

function redoText(){

    document.execCommand("redo");
}

renderNotes();

</script>

</body>
</html>
